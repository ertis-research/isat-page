# ─────────────────────────────────────────────────────────────────────────────
# EJEMPLOS COMENTADOS — copia y descomenta la sección que necesites
# ─────────────────────────────────────────────────────────────────────────────

# ── EVENTO DESTACADO (featured) ───────────────────────────────────────────────
# Solo puede haber uno. Se muestra en la tarjeta grande con imagen de fondo.
#
# featured:
#   id: "featured-1"
#   # Identificador único (no se muestra en pantalla)
#
#   date: "2024-05-15"
#   # Fecha en formato YYYY-MM-DD; se formatea automáticamente en la web
#
#   title: "Título del Evento Destacado"
#   # Admite comillas dobles; escapa las internas con \"
#
#   description: "Descripción breve del evento que aparece bajo el título."
#
#   location: "Lugar del evento (ciudad, sala, plataforma...)"
#
#   status: "Próximamente"
#   # Etiqueta que aparece en la esquina de la imagen (texto libre)
#
#   image: "https://url-de-la-imagen.jpg"
#   # URL de la imagen de portada del evento destacado
#
#   signup: true
#   # true  → muestra el botón «Inscribirse Gratis»
#   # false o ausente → no muestra el botón
#
#   program: true
#   # true  → muestra el botón «Programa (PDF)»
#   # false o ausente → no muestra el botón
#
#   program_url: "pdf/nombre-del-programa.pdf"
#   # URL del programa. Tres opciones:
#   #   PDF en assets/ → "pdf/nombre-del-archivo.pdf"  (se descarga automáticamente)
#   #   URL externa    → "https://ejemplo.com/programa.pdf"
#   #   Página interna → "/eventos/programa-jornada/"  (navega a la página)


# ── EVENTOS PRÓXIMOS (upcoming) ───────────────────────────────────────────────
# Lista de eventos futuros que aparecen en la «Agenda Próxima».
#
# upcoming:
#   - id: "e-01ene"
#     # Identificador único (no se muestra en pantalla)
#
#     date: "2025-01-01"
#     # Fecha completa (solo informativa, no se renderiza directamente en la tarjeta)
#
#     day: "01"
#     # Número de día que se muestra en el «badge» de fecha (2 dígitos)
#
#     month: "Ene"
#     # Mes abreviado que se muestra bajo el día en el badge
#
#     title: "Título del evento próximo"
#
#     description: "Descripción corta que aparece bajo el título en la tarjeta."
#
#     location: "Ciudad o plataforma online"
#
#     status: "Inscripción Abierta"
#     # Etiqueta de estado. El color depende del mapeado en params.yaml
#     # (status_classes). Ejemplos habituales:
#     #   "Inscripción Abierta"  → badge verde
#     #   "Próximamente"         → badge azul
#     #   "Completo"             → badge rojo
#
#     waiting: true
#     # true  → muestra el botón deshabilitado «Esperando fecha» (sin enlace)
#     # false o ausente → muestra el botón «Detalles» con enlace


