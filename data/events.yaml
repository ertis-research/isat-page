# ---------------------------------------------------------------------------
# EVENTOS iSAT -- ferias, jornadas, presentaciones y apariciones mediaticas.
# El primer elemento (mas reciente) se usa como featured automaticamente.
#
# Campos comunes con noticias.yaml y publicaciones.yaml:
#   title       : Titulo del evento
#   date        : Fecha legible (p.ej. "Septiembre 2025")
#   date_sort   : Fecha ISO para ordenacion (YYYY-MM-DD)
#   category    : eventos
#   tag         : Etiqueta visible en las tarjetas
#   tag_color   : blue | green | purple | orange | red
#   image       : Ruta local (media/...) o URL https://...
#   icon        : Icono FA de respaldo si no hay imagen
#   description : Texto corto visible en tarjeta y homepage
#   url         : Enlace destino del evento
#   cta         : Texto del boton en la vista featured (opcional)
#
# Campos opcionales especificos de eventos:
#   location    : Lugar del evento
#   status      : Etiqueta de estado ("Realizado", "Proximamente", etc.)
#   signup      : true -> boton de inscripcion
#   program     : true -> boton de programa PDF
#   program_url : URL del programa (PDF local, externo, o pagina interna)
#
# ORDEN: mas reciente primero -> el primero se muestra como featured.
# ---------------------------------------------------------------------------

items:

  - title: "Microcharla: Y si manana no sale agua de tu grifo? Cuidemos el agua invisible"
    date: "Septiembre 2025"
    date_sort: "2025-09-01"
    category: "eventos"
    tag: "Evento"
    tag_color: "green"
    image: "media/aguaimag-760x470.png"
    icon: "calendar-check"
    description: "Participacion del equipo iSAT en La Noche de los Investigadores, con una microcharla sobre la importancia del agua subterranea y las sequias en zonas karsticas."
    url: "https://lanochedelosinvestigadores.fundaciondescubre.es/actividades/y-si-manana-no-sale-agua-de-tu-grifo-cuidemos-el-agua-invisible/"
    cta: "Ver evento"
    location: "Fundacion Descubre"
    status: "Realizado"

  - title: "Programa Tesis de Canal Sur: La gestion de las Aguas Subterraneas"
    date: "Marzo 2025"
    date_sort: "2025-03-02"
    category: "eventos"
    tag: "Evento"
    tag_color: "purple"
    image: "media/a8a798a79a094a599593df8c691d6bab.png"
    icon: "tv"
    description: "Entrevista en el programa Tesis de Canal Sur sobre la gestion sostenible de los recursos hidricos subterraneos en Andalucia."
    url: "https://www.canalsurmas.es/videos/detail/222408-tesis-02032025"
    cta: "Ver programa"
    location: "Canal Sur, Sevilla"
    status: "Realizado"

